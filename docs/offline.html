<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "SF Pro Text", sans-serif;
      background: radial-gradient(circle at top, #f6f3ea 0%, #ebe3d1 40%, #e4dbc6 100%);
      color: #153b2f;
      padding: 24px;
      text-align: center;
    }
    main {
      max-width: 500px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(20, 47, 38, 0.15);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.5rem;
    }
    p {
      margin: 0;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sin conexión</h1>
    <p>La app está instalada, pero ahora mismo no hay red para cargar nuevo contenido. Si ya abriste un examen antes, vuelve con el botón Atrás del navegador.</p>
  </main>

</html>
